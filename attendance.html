<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वर्कर हाजिरी - My Indian Karigar</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        button { width: 80%; padding: 15px; margin: 10px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-in { background: #27ae60; }
        .btn-out { background: #e67e22; }
    </style>
</head>
<body>

    <div class="card">
    <h2>🛠️ वर्कर अटेंडेंस</h2>
    <p>कृपया काम पर पहुँचने और जाने के समय फोटो खींचें।</p>
    
    <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display: none;" onchange="uploadPhoto()">
    
    <button class="btn-in" onclick="openCamera('In')">📸 पहुँच गया (Check In)</button>
    <button class="btn-out" onclick="openCamera('Out')">📸 काम खत्म (Check Out)</button>
    
    <div id="statusMessage" style="margin-top: 15px; font-weight: bold; color: #2c3e50;"></div>
    
    <br><br>
    <a href="index.html" style="color: #777; text-decoration: none;">← वापस जाएं</a>
</div>


    <script src="script.js"></script>
    
    <script>
function recordAttendance(status) {
    const scriptURL = 'आपका_गूगल_स्क्रिप्ट_URL'; // अपना Apps Script URL यहाँ डालें
    
    // अभी के लिए हम मोबाइल नंबर पूछ सकते हैं या इसे लॉगिन से जोड़ सकते हैं
    const workerMobile = prompt("अपनी हाजिरी दर्ज करने के लिए मोबाइल नंबर डालें:");
    
    if (!workerMobile) return;

    const data = {
        userType: 'attendance',
        regMobile: workerMobile,
        status: status, // 'Check In' या 'Check Out'
        timestamp: new Date().toLocaleString()
    };

    // बटन को कुछ देर के लिए डिसेबल करना
    const btnText = status === 'Check In' ? 'पहुँच गया...' : 'काम खत्म...';
    alert("हाजिरी भेजी जा रही है...");

    fetch(scriptURL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify(data) 
    })
    .then(() => {
        alert("आपकी " + status + " हाजिरी लग गई है!");
    })
    .catch(error => console.error('Error!', error.message));
}
</script>

</body>
</html>
