<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वर्कर रजिस्ट्रेशन - My Indian Workers</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        h2 { color: #e67e22; margin-bottom: 20px; text-align: center; }
        
        /* इनपुट बॉक्स स्टाइल */
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 8px 0; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            box-sizing: border-box; /* इससे पैडिंग बाहर नहीं निकलती */
        }

        .submit-btn { 
            width: 100%; 
            padding: 12px; 
            background: #e67e22; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
        }
        
        .submit-btn:hover { background: #d35400; }
        .back { display: block; text-align: center; margin-top: 15px; color: gray; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>वर्कर जानकारी</h2>
    <button type="button" onclick="location.href='owner-form.html'">वर्कर पंजीकरण</button>

   <form id="workerForm">
    <input type="text" id="regName" name="regName" placeholder="पूरा नाम" required>
    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
    <select name="countryCode" style="width: 85px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px;">
        <option value="+91">+91 (IN)</option>
        <option value="+966">+966 (SA)</option>
        <option value="+971">+971 (UAE)</option>
    </select>

    <input type="tel" 
           name="regMobile" 
           placeholder="मोबाइल नंबर (10 अंक)" 
           pattern="[0-9]{10}" 
           title="कृपया 10 अंकों का सही मोबाइल नंबर डालें" 
           maxlength="10" 
           oninput="this.value = this.value.replace(/[^0-9]/g, '');"
           style="flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box;"
           required>
</div>
<div style="width: 100%; margin-bottom: 10px;">
    <input type="tel" 
           name="regAadhar" 
           placeholder="आधार कार्ड नंबर (12 अंक)" 
           pattern="[0-9]{12}" 
           title="आधार कार्ड 12 अंकों का होना चाहिए" 
           maxlength="12" 
           oninput="this.value = this.value.replace(/[^0-9]/g, '');"
           style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; display: block;"
           required>
</div>

<input type="text" name="regAddress" placeholder="पूरा पता (मकान नंबर/गली)" required>
    
<input type="text" name="regCity" placeholder="अपना शहर लिखें (जैसे: अयोध्या)" required>

  <input type="text" id="regWork" name="regWork" placeholder="आपका काम" required>
     <input type="hidden" name="userType" value="Worker">

    <button type="submit" class="submit-btn">सबमिट करें</button>
</form>
<div style="text-align:center; margin-top:20px;">
    <button onclick="window.location.href='attendance.html'" 
            style="background:#2c3e50; color:white; padding:15px 30px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:90%; font-size:18px;">
        📸 वर्कर हाजिरी (Attendance)
    </button>
</div>

<div style="background:white; padding:20px; border-radius:15px; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
    <h3>अपनी हाजिरी दर्ज करें</h3>
    
    <button onclick="takeAttendance('In')" 
            style="background:#27ae60; color:white; width:100%; padding:15px; margin-bottom:10px; border:none; border-radius:8px; font-weight:bold;">
        ✅ पहुँच गया (Check In)
    </button>

    <button onclick="takeAttendance('Out')" 
            style="background:#e67e22; color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold;">
        🚩 काम खत्म (Check Out)
    </button>
</div>

   <a href="login-choice.html" class="back">← वापस जाएँ</a>
</div>
    <script src="script.js"></script>
    
    <script>
function submitWorker() {
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyuNgvUNcDQXt-D4JfazMY8VZG9tRVAnYv-rTtdfoXKDysRLbSK8ut3lKSnb5ihYJfl/exec';// यहाँ अपना नया लिंक डालें
    const data = {
        userType: 'worker',
        regName: document.getElementById('regName').value,
        regMobile: document.getElementById('regMobile').value,
        regAadhar: document.getElementById('regAadhar').value, // आधार कार्ड यहाँ से उठेगा
        regAddress: document.getElementById('regAddress').value,
        regCity: document.getElementById('regCity').value,
        regWork: document.getElementById('regWork').value,
        countryCode: '+91'
    };

    fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
    .then(() => {
        alert("वर्कर डेटा सुरक्षित हो गया!");
        window.location.href = 'attendance.html'; // सबमिट के बाद हाजिरी वाला पेज खुलेगा
    });
}
</script>

<script>
function searchWorkers() {
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzusC1asZTlA0mnmU5VNnfwaDXCS5MaJ_JOCvVBLEXgBLaL_BjUV7zDTQxY4QHb7A7k/exec';//
    const cityName = document.getElementsByName("cityName")[0].value;
    const workCategory = document.getElementsByName("workCategory")[0].value;

    const btn = document.querySelector('button');
    btn.innerHTML = "खोज रहे हैं...";
    btn.disabled = true;

    // डेटा को गूगल शीट से खोजने के लिए रिक्वेस्ट (GET)
    fetch(`${scriptURL}?type=search&city=${cityName}&work=${workCategory}`)
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success' && data.workers.length > 0) {
            // अगर वर्कर मिल गए, तो उन्हें दिखाने का तरीका यहाँ लिखें
            alert(data.workers.length + " कारीगर मिले!");
            console.log(data.workers);
            // आप यहाँ एक लिस्ट दिखा सकते हैं
        } else {
            alert("माफ़ करें, इस शहर में अभी कोई कारीगर उपलब्ध नहीं है।");
        }
        btn.innerHTML = "खोजें";
        btn.disabled = false;
    })
    .catch(error => {
        console.error('Error!', error.message);
        alert("अभी खोज सेवा में कुछ तकनीकी दिक्कत है।");
        btn.innerHTML = "खोजें";
        btn.disabled = false;
    });
}
</script>


</body>
</html>
